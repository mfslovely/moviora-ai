services:
  postgres:
    image: postgres:16-alpine
    container_name: moviora-postgres
    environment:
      POSTGRES_USER: moviora
      POSTGRES_PASSWORD: moviora
      POSTGRES_DB: moviora
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    container_name: moviora-backend
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - postgres

volumes:
  postgres_data:
